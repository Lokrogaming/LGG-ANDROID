name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node (wichtig für Capacitor 8)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # Capacitor sync
      - name: Sync Capacitor
        run: npx cap sync android

      # Java für Gradle
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Gradle Permission fix
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # OPTIONAL: Splash/Icon vorbereiten (ohne sharp!)
      - name: Prepare Android assets
        run: |
          mkdir -p android/app/src/main/res
          cp assets/icon.png android/app/src/main/res/icon.png || true
          cp assets/splash.png android/app/src/main/res/splash.png || true

      # Build APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
